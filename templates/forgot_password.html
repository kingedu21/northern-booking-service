{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<style>
    .forgot-card {
        max-width: 540px;
        margin: 80px auto;
        background: rgba(17, 24, 39, 0.9);
        color: #ffffff;
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
    }
    .forgot-card input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        margin-top: 6px;
        margin-bottom: 14px;
    }
    .forgot-card label {
        font-weight: 600;
        display: block;
        margin-top: 8px;
    }
</style>

<div class="forgot-card">
    <h2 class="mb-3">Forgot Your Password?</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success" type="submit">Send Reset Link</button>
    </form>
</div>
{% endblock %}
