{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="row pt-4">
        <div class="col-lg-12 d-print-none mb-3">
            <button class="btn btn-success" onclick="printTicket()">Print Ticket</button>
            <a href="{% url 'download_ticket_pdf' booking.id %}" class="btn btn-primary">Download PDF</a>
        </div>

        <div class="col-lg-10 mx-auto" id="ticket">
            {% for ticket in tickets %}
            <div class="card border-success mb-4">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-1">Railway Ticket</h4>
                    <small>Passenger Copy {{ forloop.counter }} of {{ tickets|length }}</small>
                </div>
                <div class="card-body">
                    <form>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Booking Reference</label>
                                <input type="text" class="form-control" value="{{ booking.id }}" readonly>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Ticket ID</label>
                                <input type="text" class="form-control font-weight-bold" value="{{ ticket.ticket_uid|default:ticket.id }}" readonly>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Booking Status</label>
                                <input type="text" class="form-control font-weight-bold" value="{{ booking_status_value|default:'Pending' }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Passenger Name</label>
                                <input type="text" class="form-control" value="{{ ticket.passenger.full_name|default:booking.user.get_full_name }}" readonly>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Gender</label>
                                <input type="text" class="form-control" value="{{ ticket.passenger.gender|default:'Other' }}" readonly>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Seat Number</label>
                                <input type="text" class="form-control font-weight-bold" value="{{ ticket.seat_number|default:'-' }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Train Name</label>
                                <input type="text" class="form-control" value="{{ booking.train_name }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>From</label>
                                <input type="text" class="form-control" value="{{ booking.source }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>To</label>
                                <input type="text" class="form-control" value="{{ booking.destination }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-3">
                                <label>Travel Date</label>
                                <input type="text" class="form-control" value="{{ booking.travel_date }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Departure</label>
                                <input type="text" class="form-control" value="{{ booking.departure_time }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Arrival</label>
                                <input type="text" class="form-control" value="{{ booking.arrival_time }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Class</label>
                                <input type="text" class="form-control" value="{{ class_type_value }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-3">
                                <label>Fare (KES)</label>
                                <input type="text" class="form-control font-weight-bold" value="{{ ticket.fare }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Payment Method</label>
                                <input type="text" class="form-control" value="{{ pay_method_value }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Transaction Code</label>
                                <input type="text" class="form-control" value="{{ trxid_value }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Payment Status</label>
                                <input type="text" class="form-control font-weight-bold text-success" value="{{ pay_status_value }}" readonly>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<style>
@media print {
    .d-print-none {
        display: none !important;
    }
}
</style>
<script>
function printTicket() {
    window.print();
}

window.addEventListener('DOMContentLoaded', function () {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('print') === 'true') {
        window.print();
    }
});
</script>
{% endblock content %}
