{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="row pt-4">
        <div class="col-lg-12 d-print-none mb-3">
            <button class="btn btn-success" onclick="printTicket()">Print Ticket</button>
            <a href="{{ ticket_file_url }}" class="btn btn-primary" download>Download PDF</a>
        </div>

        <div class="col-lg-10 mx-auto" id="ticket">
            <div class="card border-success mb-4">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-1">Railway Ticket</h4>
                    <small>Passenger Copy</small>
                </div>
                <div class="card-body">
                    <form>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Booking ID</label>
                                <input type="text" class="form-control" value="{{ booking.id }}" readonly>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Booking Date</label>
                                <input type="text" class="form-control" value="{{ booking.booking_date|default:booking.created_at|date:'Y-m-d' }}" readonly>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Booking Status</label>
                                <input type="text" class="form-control font-weight-bold" value="{{ booking_status_value|default:'Pending' }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Passenger Name</label>
                                <input type="text" class="form-control" value="{{ passenger_name }}" readonly>
                            </div>
                            <div class="form-group col-md-6">
                                <label>Email</label>
                                <input type="text" class="form-control" value="{{ email_value }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Phone</label>
                                <input type="text" class="form-control" value="{{ phone_value }}" readonly>
                            </div>
                            <div class="form-group col-md-6">
                                <label>Train Name</label>
                                <input type="text" class="form-control" value="{{ booking.train_name }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>From</label>
                                <input type="text" class="form-control" value="{{ booking.source }}" readonly>
                            </div>
                            <div class="form-group col-md-6">
                                <label>To</label>
                                <input type="text" class="form-control" value="{{ booking.destination }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Travel Date</label>
                                <input type="text" class="form-control" value="{{ booking.travel_date }}" readonly>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Departure Time</label>
                                <input type="text" class="form-control" value="{{ booking.departure_time }}" readonly>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Arrival Time</label>
                                <input type="text" class="form-control" value="{{ booking.arrival_time }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-3">
                                <label>Class Type</label>
                                <input type="text" class="form-control" value="{{ class_type_value }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Adults</label>
                                <input type="text" class="form-control" value="{{ booking.passengers_adult|default:0 }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Children</label>
                                <input type="text" class="form-control" value="{{ booking.passengers_child|default:0 }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Total Passengers</label>
                                <input type="text" class="form-control" value="{{ passenger_total }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-12">
                                <label>Seat Number(s)</label>
                                <input type="text" class="form-control font-weight-bold" value="{{ selected_seats_value }}" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-3">
                                <label>Total Fare (KES)</label>
                                <input type="text" class="form-control font-weight-bold" value="{{ booking.total_fare }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Payment Method</label>
                                <input type="text" class="form-control" value="{{ pay_method_value }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Transaction Code</label>
                                <input type="text" class="form-control" value="{{ trxid_value }}" readonly>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Payment Status</label>
                                <input type="text" class="form-control font-weight-bold text-success" value="{{ pay_status_value }}" readonly>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
@media print {
    .d-print-none {
        display: none !important;
    }
}
</style>
<script>
function printTicket() {
    window.print();
}

window.addEventListener('DOMContentLoaded', function () {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('print') === 'true') {
        window.print();
    }
});
</script>
{% endblock content %}
